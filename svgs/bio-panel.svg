<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <style>
      .pulse { animation: pulse 3s ease-in-out infinite; }
      .pulse2 { animation: pulse 3s ease-in-out infinite 1s; }
      .pulse3 { animation: pulse 3s ease-in-out infinite 1.5s; }
      .scan { animation: scan 5s linear infinite; }
      .blink { animation: blink 1.2s step-end infinite; }
      .glow-line { animation: glowline 2.5s ease-in-out infinite alternate; }
      @keyframes pulse { 0%,100%{opacity:0.3}50%{opacity:1} }
      @keyframes scan { 0%{transform:translateY(-5px);opacity:0.5} 100%{transform:translateY(235px);opacity:0} }
      @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
      @keyframes glowline { 0%{opacity:0.3}100%{opacity:0.9} }
    </style>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
    <filter id="strong"><feGaussianBlur stdDeviation="5" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000800"/>
      <stop offset="100%" stop-color="#000300"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#001a06" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#000d03" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="900" height="240" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.04" stroke="#00ff9c" stroke-width="0.5">
    <line x1="0" y1="30" x2="900" y2="30"/><line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="90" x2="900" y2="90"/><line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="90" y1="0" x2="90" y2="240"/><line x1="180" y1="0" x2="180" y2="240"/>
    <line x1="270" y1="0" x2="270" y2="240"/><line x1="360" y1="0" x2="360" y2="240"/>
    <line x1="450" y1="0" x2="450" y2="240"/><line x1="540" y1="0" x2="540" y2="240"/>
    <line x1="630" y1="0" x2="630" y2="240"/><line x1="720" y1="0" x2="720" y2="240"/>
    <line x1="810" y1="0" x2="810" y2="240"/>
  </g>
  <rect class="scan" x="0" y="0" width="900" height="1.5" fill="#00ff9c" opacity="0.12"/>

  <!-- Outer border -->
  <rect x="8" y="8" width="884" height="224" rx="3" fill="none" stroke="#00ff9c" stroke-width="1" opacity="0.4" class="glow-line"/>
  <polyline points="8,30 8,8 30,8" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="870,8 892,8 892,30" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="8,210 8,232 30,232" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="870,232 892,232 892,210" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Header bar -->
  <rect x="8" y="8" width="884" height="24" fill="#001a06" opacity="0.95"/>
  <text x="20" y="24" fill="#00ff9c" font-size="10" letter-spacing="4" opacity="0.9">// BIO-CORTEX :: UNIT IDENTITY READOUT</text>
  <text x="880" y="24" fill="#00ff9c" font-size="10" letter-spacing="2" text-anchor="end" opacity="0.6">MODULE_01</text>
  <line x1="8" y1="32" x2="892" y2="32" stroke="#00ff9c" stroke-width="0.5" opacity="0.4"/>

  <!-- LEFT PANEL — silhouette area with organic frame -->
  <rect x="18" y="40" width="160" height="185" rx="2" fill="url(#panel)" stroke="#00ff9c" stroke-width="0.5" opacity="0.6"/>
  <!-- Organic ribs on left panel -->
  <g opacity="0.2" stroke="#00cc78" stroke-width="1" fill="none">
    <path d="M 22 60 Q 10 100 22 140 Q 10 180 22 220"/>
    <path d="M 30 60 Q 18 100 30 140 Q 18 180 30 220"/>
  </g>
  <!-- Avatar hex frame -->
  <polygon points="98,60 128,78 128,114 98,132 68,114 68,78" fill="#001a06" stroke="#00ff9c" stroke-width="1.5" filter="url(#glow)" opacity="0.9"/>
  <polygon points="98,66 122,80 122,108 98,122 74,108 74,80" fill="#002a0a" stroke="#00ff9c" stroke-width="0.5" opacity="0.5"/>
  <!-- Initials in avatar -->
  <text x="98" y="102" fill="#00ff9c" font-size="26" font-weight="bold" text-anchor="middle" filter="url(#glow)" letter-spacing="2">GM</text>
  <!-- Animated corners on avatar -->
  <g class="pulse" fill="#00ff9c">
    <rect x="66" y="76" width="4" height="4"/>
    <rect x="128" y="76" width="4" height="4"/>
    <rect x="66" y="112" width="4" height="4"/>
    <rect x="128" y="112" width="4" height="4"/>
  </g>
  <!-- Status below avatar -->
  <rect x="58" y="140" width="80" height="14" rx="1" fill="#001a06" stroke="#00ff9c" stroke-width="0.5" opacity="0.8"/>
  <rect x="60" y="142" width="40" height="10" rx="1" fill="#00ff9c" opacity="0.7" class="pulse"/>
  <text x="98" y="152" fill="#000" font-size="8" text-anchor="middle" font-weight="bold">ACTIVE</text>
  <text x="98" y="170" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="2" opacity="0.7">HIRE STATUS: OPEN</text>
  <!-- Scan circle -->
  <circle cx="98" cy="96" r="52" fill="none" stroke="#00ff9c" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.2" class="pulse2"/>

  <!-- CENTRE PANEL — identity data -->
  <rect x="190" y="40" width="360" height="185" rx="2" fill="url(#panel)" stroke="#00ff9c" stroke-width="0.5" opacity="0.5"/>
  <text x="200" y="58" fill="#00ff9c" font-size="9" letter-spacing="3" opacity="0.5">IDENTITY RECORD</text>
  <line x1="190" y1="62" x2="550" y2="62" stroke="#00ff9c" stroke-width="0.3" opacity="0.3"/>

  <!-- Data rows -->
  <g font-size="11" fill="#00ff9c">
    <text x="200" y="82" opacity="0.5" letter-spacing="1">UNIT_ID</text>
    <text x="310" y="82" letter-spacing="1" filter="url(#glow)" opacity="0.95">George Mando</text>

    <text x="200" y="102" opacity="0.5" letter-spacing="1">FACTION</text>
    <text x="310" y="102" letter-spacing="1" opacity="0.9">XenClipse Studios</text>

    <text x="200" y="122" opacity="0.5" letter-spacing="1">ENGINE_CORE</text>
    <text x="310" y="122" letter-spacing="1" opacity="0.9">Unreal Engine  /  Unity</text>

    <text x="200" y="142" opacity="0.5" letter-spacing="1">LANG_MATRIX</text>
    <text x="310" y="142" letter-spacing="1" opacity="0.9">C++  /  C#  /  Python</text>

    <text x="200" y="162" opacity="0.5" letter-spacing="1">ACTIVE_OP</text>
    <text x="310" y="162" letter-spacing="1" opacity="0.9" font-size="10">Blueprint Generator [UE Plugin]</text>

    <text x="200" y="182" opacity="0.5" letter-spacing="1">DIRECTIVE</text>
    <text x="310" y="182" letter-spacing="1" opacity="0.9" font-size="10">Systems that feel alive</text>
  </g>
  <!-- Separator lines -->
  <g stroke="#00ff9c" stroke-width="0.3" opacity="0.2">
    <line x1="200" y1="88" x2="540" y2="88"/>
    <line x1="200" y1="108" x2="540" y2="108"/>
    <line x1="200" y1="128" x2="540" y2="128"/>
    <line x1="200" y1="148" x2="540" y2="148"/>
    <line x1="200" y1="168" x2="540" y2="168"/>
  </g>
  <!-- Vertical divider in data panel -->
  <line x1="300" y1="62" x2="300" y2="220" stroke="#00ff9c" stroke-width="0.3" opacity="0.25" stroke-dasharray="2 4"/>

  <!-- RIGHT PANEL — mission objective dials -->
  <rect x="562" y="40" width="330" height="185" rx="2" fill="url(#panel)" stroke="#00ff9c" stroke-width="0.5" opacity="0.5"/>
  <text x="572" y="58" fill="#00ff9c" font-size="9" letter-spacing="3" opacity="0.5">CURRENT OBJECTIVES</text>
  <line x1="562" y1="62" x2="892" y2="62" stroke="#00ff9c" stroke-width="0.3" opacity="0.3"/>

  <!-- Progress bars -->
  <g font-size="9" fill="#00ff9c">
    <!-- Row 1 -->
    <text x="572" y="82" opacity="0.6" letter-spacing="1">BLUEPRINT_GEN</text>
    <rect x="572" y="86" width="310" height="7" rx="1" fill="none" stroke="#00ff9c" stroke-width="0.5" opacity="0.3"/>
    <rect x="572" y="86" width="232" height="7" rx="1" fill="#00ff9c" opacity="0.6" class="pulse"/>
    <text x="888" y="93" opacity="0.7" text-anchor="end" font-size="8">75%</text>

    <!-- Row 2 -->
    <text x="572" y="110" opacity="0.6" letter-spacing="1">PORTFOLIO_POLISH</text>
    <rect x="572" y="114" width="310" height="7" rx="1" fill="none" stroke="#00ff9c" stroke-width="0.5" opacity="0.3"/>
    <rect x="572" y="114" width="155" height="7" rx="1" fill="#00ff9c" opacity="0.6" class="pulse2"/>
    <text x="888" y="121" opacity="0.7" text-anchor="end" font-size="8">50%</text>

    <!-- Row 3 -->
    <text x="572" y="138" opacity="0.6" letter-spacing="1">UE5_ENGINE_DEPTH</text>
    <rect x="572" y="142" width="310" height="7" rx="1" fill="none" stroke="#00ff9c" stroke-width="0.5" opacity="0.3"/>
    <rect x="572" y="142" width="93" height="7" rx="1" fill="#00cc78" opacity="0.6" class="pulse3"/>
    <text x="888" y="149" opacity="0.7" text-anchor="end" font-size="8">30%</text>

    <!-- Row 4 -->
    <text x="572" y="166" opacity="0.6" letter-spacing="1">OPEN_SOURCE</text>
    <rect x="572" y="170" width="310" height="7" rx="1" fill="none" stroke="#00ff9c" stroke-width="0.5" opacity="0.3"/>
    <rect x="572" y="170" width="31" height="7" rx="1" fill="#00aa60" opacity="0.6" class="pulse"/>
    <text x="888" y="177" opacity="0.7" text-anchor="end" font-size="8">10%</text>
  </g>

  <!-- Tick marks on bars -->
  <g stroke="#00ff9c" stroke-width="0.3" opacity="0.2">
    <line x1="649" y1="84" x2="649" y2="95"/><line x1="726" y1="84" x2="726" y2="95"/>
    <line x1="804" y1="84" x2="804" y2="95"/><line x1="882" y1="84" x2="882" y2="95"/>
  </g>

  <!-- Bottom bar -->
  <line x1="8" y1="218" x2="892" y2="218" stroke="#00ff9c" stroke-width="0.3" opacity="0.3"/>
  <text x="450" y="232" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="3" opacity="0.5">[ END BIO-CORTEX READOUT ]<tspan class="blink"> _</tspan></text>
</svg>
