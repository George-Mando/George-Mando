<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <style>
      .p1{animation:pulse 3s ease-in-out infinite}
      .p2{animation:pulse 3s ease-in-out infinite 1s}
      .p3{animation:pulse 3s ease-in-out infinite 2s}
      .scan{animation:scan 5s linear infinite}
      .blink{animation:blink 1s step-end infinite}
      .glow{animation:glowline 2s ease-in-out infinite alternate}
      @keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}
      @keyframes scan{0%{transform:translateY(-3px);opacity:.35}100%{transform:translateY(218px);opacity:0}}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      @keyframes glowline{0%{opacity:.3}100%{opacity:.8}}
    </style>
    <filter id="g"><feGaussianBlur stdDeviation="2.5" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000800"/><stop offset="100%" stop-color="#000200"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001d08"/><stop offset="100%" stop-color="#000902"/>
    </linearGradient>
  </defs>

  <rect width="900" height="220" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#00ff9c" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="90" y1="0" x2="90" y2="220"/><line x1="180" y1="0" x2="180" y2="220"/>
    <line x1="450" y1="0" x2="450" y2="220"/><line x1="540" y1="0" x2="540" y2="220"/>
    <line x1="720" y1="0" x2="720" y2="220"/><line x1="810" y1="0" x2="810" y2="220"/>
  </g>
  <rect class="scan" x="0" y="0" width="900" height="1.5" fill="#00ff9c" opacity="0.1"/>

  <rect x="8" y="8" width="884" height="204" rx="3" fill="none" stroke="#00ff9c" stroke-width="1" opacity="0.35" class="glow"/>
  <polyline points="8,26 8,8 26,8" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#g)"/>
  <polyline points="874,8 892,8 892,26" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#g)"/>
  <polyline points="8,194 8,212 26,212" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#g)"/>
  <polyline points="874,212 892,212 892,194" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#g)"/>

  <rect x="8" y="8" width="884" height="22" fill="#001a06" opacity="0.9"/>
  <text x="20" y="22" fill="#00ff9c" font-size="10" letter-spacing="4" opacity="0.9">// MISSION-FILES :: ACTIVE DEPLOYMENTS</text>
  <text x="880" y="22" fill="#00ff9c" font-size="10" letter-spacing="2" text-anchor="end" opacity="0.6">MODULE_03</text>
  <line x1="8" y1="30" x2="892" y2="30" stroke="#00ff9c" stroke-width="0.5" opacity="0.3"/>

  <!-- PROJECT CARD LEFT -->
  <rect x="18" y="38" width="418" height="166" rx="3" fill="url(#card)" stroke="#00ff9c" stroke-width="1" class="p1" filter="url(#g)"/>
  <!-- Card top accent line -->
  <line x1="18" y1="38" x2="436" y2="38" stroke="#00ff9c" stroke-width="2" opacity="0.8" filter="url(#g)"/>
  <!-- Card header -->
  <rect x="18" y="38" width="418" height="26" fill="#002a08" opacity="0.8"/>
  <text x="34" y="55" fill="#00ff9c" font-size="11" font-weight="bold" letter-spacing="3" filter="url(#g)">BLUEPRINT-GEN</text>
  <rect x="340" y="43" width="90" height="14" rx="2" fill="#003a10" stroke="#00ff9c" stroke-width="0.5" opacity="0.8"/>
  <text x="385" y="53" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="2" opacity="0.9">UE PLUGIN</text>

  <!-- Status indicator -->
  <circle cx="28" cy="51" r="4" fill="#00ff9c" class="p1" filter="url(#g)"/>

  <text x="34" y="84" fill="#00ff9c" font-size="10" opacity="0.8" letter-spacing="1">Auto-generates movement + combat Blueprints</text>
  <text x="34" y="100" fill="#00ff9c" font-size="10" opacity="0.8" letter-spacing="1">inside UE Editor. Slashes proto time to zero.</text>

  <line x1="28" y1="110" x2="426" y2="110" stroke="#00ff9c" stroke-width="0.3" opacity="0.25"/>

  <text x="34" y="126" fill="#00ff9c" font-size="8" opacity="0.5" letter-spacing="2">STACK</text>
  <!-- Stack tags -->
  <rect x="80" y="116" width="40" height="14" rx="2" fill="#002010" stroke="#00ff9c" stroke-width="0.5" opacity="0.7"/>
  <text x="100" y="126" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="1">C++</text>
  <rect x="128" y="116" width="76" height="14" rx="2" fill="#002010" stroke="#00ff9c" stroke-width="0.5" opacity="0.7"/>
  <text x="166" y="126" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="1">UNREAL ENG</text>
  <rect x="212" y="116" width="90" height="14" rx="2" fill="#002010" stroke="#00ff9c" stroke-width="0.5" opacity="0.7"/>
  <text x="257" y="126" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="1">BLUEPRINTS</text>

  <!-- Progress bar -->
  <text x="34" y="152" fill="#00ff9c" font-size="8" opacity="0.5" letter-spacing="2">COMPLETION</text>
  <rect x="120" y="142" width="310" height="8" rx="1" fill="none" stroke="#00ff9c" stroke-width="0.5" opacity="0.3"/>
  <rect x="120" y="142" width="232" height="8" rx="1" fill="#00ff9c" opacity="0.55" class="p1"/>
  <text x="438" y="150" fill="#00ff9c" font-size="8" text-anchor="end" opacity="0.8">75%</text>

  <text x="34" y="178" fill="#00ff9c" font-size="8" opacity="0.5" letter-spacing="2">STATUS</text>
  <text x="100" y="178" fill="#ff6b35" font-size="9" letter-spacing="3" opacity="0.9">REPOSITORY INCOMING</text>

  <!-- PROJECT CARD RIGHT -->
  <rect x="464" y="38" width="418" height="166" rx="3" fill="url(#card)" stroke="#00ff9c" stroke-width="1" class="p2" filter="url(#g)"/>
  <line x1="464" y1="38" x2="882" y2="38" stroke="#00ff9c" stroke-width="2" opacity="0.8" filter="url(#g)"/>
  <rect x="464" y="38" width="418" height="26" fill="#002a08" opacity="0.8"/>
  <text x="480" y="55" fill="#00ff9c" font-size="11" font-weight="bold" letter-spacing="3" filter="url(#g)">DR-MARIO-X</text>
  <rect x="760" y="43" width="116" height="14" rx="2" fill="#003a10" stroke="#00ff9c" stroke-width="0.5" opacity="0.8"/>
  <text x="818" y="53" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="2" opacity="0.9">LIVE DEPLOY</text>

  <circle cx="474" cy="51" r="4" fill="#00ff9c" class="p2" filter="url(#g)"/>

  <text x="480" y="84" fill="#00ff9c" font-size="10" opacity="0.8" letter-spacing="1">Classic Dr. Mario rebuilt with MAGIC, HACKER</text>
  <text x="480" y="100" fill="#00ff9c" font-size="10" opacity="0.8" letter-spacing="1">and BIRD theme variants. Mechanic exploration.</text>

  <line x1="474" y1="110" x2="872" y2="110" stroke="#00ff9c" stroke-width="0.3" opacity="0.25"/>

  <text x="480" y="126" fill="#00ff9c" font-size="8" opacity="0.5" letter-spacing="2">STACK</text>
  <rect x="526" y="116" width="40" height="14" rx="2" fill="#002010" stroke="#00ff9c" stroke-width="0.5" opacity="0.7"/>
  <text x="546" y="126" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="1">C++</text>
  <rect x="574" y="116" width="104" height="14" rx="2" fill="#002010" stroke="#00ff9c" stroke-width="0.5" opacity="0.7"/>
  <text x="626" y="126" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="1">GAMEPLAY SYS</text>
  <rect x="686" y="116" width="96" height="14" rx="2" fill="#002010" stroke="#00ff9c" stroke-width="0.5" opacity="0.7"/>
  <text x="734" y="126" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="1">CUSTOM LOGIC</text>

  <text x="480" y="152" fill="#00ff9c" font-size="8" opacity="0.5" letter-spacing="2">PLATFORM</text>
  <text x="560" y="152" fill="#00ff9c" font-size="9" letter-spacing="2" opacity="0.8">itch.io — george-carter.itch.io</text>

  <text x="480" y="178" fill="#00ff9c" font-size="8" opacity="0.5" letter-spacing="2">STATUS</text>
  <text x="546" y="178" fill="#00ff9c" font-size="9" letter-spacing="3" class="blink" filter="url(#g)">■ LIVE</text>

  <!-- divider center -->
  <line x1="450" y1="38" x2="450" y2="212" stroke="#00ff9c" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 8"/>

  <!-- Bottom -->
  <line x1="8" y1="208" x2="892" y2="208" stroke="#00ff9c" stroke-width="0.3" opacity="0.2"/>
  <text x="450" y="218" fill="#00ff9c" font-size="7" text-anchor="middle" letter-spacing="4" opacity="0.35">[ END MISSION_FILES ]</text>
</svg>
