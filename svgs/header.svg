<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <style>
      .pulse { animation: pulse 3s ease-in-out infinite; }
      .pulse2 { animation: pulse 3s ease-in-out infinite 1s; }
      .pulse3 { animation: pulse 3s ease-in-out infinite 2s; }
      .scan { animation: scan 4s linear infinite; }
      .flicker { animation: flicker 6s linear infinite; }
      .glow-line { animation: glowline 2s ease-in-out infinite alternate; }
      .drift { animation: drift 8s ease-in-out infinite alternate; }
      .blink { animation: blink 1.4s step-end infinite; }
      @keyframes pulse {
        0%,100% { opacity:0.3; }
        50% { opacity:1; }
      }
      @keyframes scan {
        0% { transform: translateY(-10px); opacity:0.6; }
        100% { transform: translateY(310px); opacity:0; }
      }
      @keyframes flicker {
        0%,19%,21%,23%,25%,54%,56%,100% { opacity:1; }
        20%,22%,24%,55% { opacity:0.4; }
      }
      @keyframes glowline {
        0% { stroke-width:1; opacity:0.4; }
        100% { stroke-width:2.5; opacity:1; }
      }
      @keyframes drift {
        0% { transform: translateX(-3px); }
        100% { transform: translateX(3px); }
      }
      @keyframes blink {
        0%,100% { opacity:1; }
        50% { opacity:0; }
      }
    </style>
    <filter id="acid-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="strong-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000500"/>
      <stop offset="40%" stop-color="#000d03"/>
      <stop offset="100%" stop-color="#000200"/>
    </linearGradient>
    <linearGradient id="panel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001a06"/>
      <stop offset="100%" stop-color="#000a02"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003a10"/>
      <stop offset="40%" stop-color="#00ff9c"/>
      <stop offset="60%" stop-color="#00ff9c"/>
      <stop offset="100%" stop-color="#003a10"/>
    </linearGradient>
    <mask id="scan-mask">
      <rect width="900" height="320" fill="white"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg-grad)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#00ff9c" stroke-width="0.5">
    <line x1="0" y1="32" x2="900" y2="32"/>
    <line x1="0" y1="64" x2="900" y2="64"/>
    <line x1="0" y1="96" x2="900" y2="96"/>
    <line x1="0" y1="128" x2="900" y2="128"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="192" x2="900" y2="192"/>
    <line x1="0" y1="224" x2="900" y2="224"/>
    <line x1="0" y1="256" x2="900" y2="256"/>
    <line x1="0" y1="288" x2="900" y2="288"/>
    <line x1="60" y1="0" x2="60" y2="320"/>
    <line x1="120" y1="0" x2="120" y2="320"/>
    <line x1="180" y1="0" x2="180" y2="320"/>
    <line x1="240" y1="0" x2="240" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="360" y1="0" x2="360" y2="320"/>
    <line x1="420" y1="0" x2="420" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="540" y1="0" x2="540" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="660" y1="0" x2="660" y2="320"/>
    <line x1="720" y1="0" x2="720" y2="320"/>
    <line x1="780" y1="0" x2="780" y2="320"/>
    <line x1="840" y1="0" x2="840" y2="320"/>
  </g>

  <!-- Scanner line -->
  <rect class="scan" x="0" y="0" width="900" height="2" fill="#00ff9c" opacity="0.18"/>

  <!-- Outer frame -->
  <rect x="8" y="8" width="884" height="304" rx="4" fill="none" stroke="#00ff9c" stroke-width="1.5" opacity="0.5" class="glow-line"/>
  <!-- Corner accents -->
  <polyline points="8,40 8,8 40,8" fill="none" stroke="#00ff9c" stroke-width="3" filter="url(#acid-glow)"/>
  <polyline points="860,8 892,8 892,40" fill="none" stroke="#00ff9c" stroke-width="3" filter="url(#acid-glow)"/>
  <polyline points="8,280 8,312 40,312" fill="none" stroke="#00ff9c" stroke-width="3" filter="url(#acid-glow)"/>
  <polyline points="860,312 892,312 892,280" fill="none" stroke="#00ff9c" stroke-width="3" filter="url(#acid-glow)"/>

  <!-- Top bar -->
  <rect x="8" y="8" width="884" height="28" fill="#001a06" opacity="0.9"/>
  <text x="20" y="26" fill="#00ff9c" font-size="10" opacity="0.8" letter-spacing="3">XENCLIPSE_OS v7.4.1</text>
  <text x="450" y="26" fill="#00ff9c" font-size="10" opacity="0.8" letter-spacing="3" text-anchor="middle">// HIVE INTERFACE ACTIVE //</text>
  <text x="880" y="26" fill="#00ff9c" font-size="10" opacity="0.8" letter-spacing="2" text-anchor="end">SEC.LVL:Ω-7</text>
  <line x1="8" y1="36" x2="892" y2="36" stroke="#00ff9c" stroke-width="0.5" opacity="0.5"/>

  <!-- Organic rib lines left -->
  <g opacity="0.15" stroke="#00cc78" stroke-width="1" fill="none">
    <path d="M 30 50 Q 15 100 30 150 Q 15 200 30 250"/>
    <path d="M 42 50 Q 25 100 42 150 Q 25 200 42 250"/>
    <path d="M 54 55 Q 40 105 54 155 Q 40 205 54 255"/>
  </g>
  <!-- Organic rib lines right -->
  <g opacity="0.15" stroke="#00cc78" stroke-width="1" fill="none">
    <path d="M 870 50 Q 885 100 870 150 Q 885 200 870 250"/>
    <path d="M 858 50 Q 875 100 858 150 Q 875 200 858 250"/>
    <path d="M 846 55 Q 860 105 846 155 Q 860 205 846 255"/>
  </g>

  <!-- Status dots top-right -->
  <circle cx="820" cy="56" r="5" fill="#00ff9c" class="pulse" filter="url(#acid-glow)"/>
  <circle cx="840" cy="56" r="5" fill="#00ff9c" class="pulse2" filter="url(#acid-glow)"/>
  <circle cx="860" cy="56" r="5" fill="#ff6b35" class="pulse3" filter="url(#acid-glow)"/>
  <text x="808" y="74" fill="#00ff9c" font-size="7" opacity="0.6" letter-spacing="1" text-anchor="middle">SYS</text>
  <text x="840" y="74" fill="#00ff9c" font-size="7" opacity="0.6" letter-spacing="1" text-anchor="middle">NET</text>
  <text x="872" y="74" fill="#ff6b35" font-size="7" opacity="0.6" letter-spacing="1" text-anchor="middle">REC</text>

  <!-- Hexagon cluster left -->
  <g opacity="0.25" fill="none" stroke="#00ff9c" stroke-width="0.8">
    <polygon points="70,80 85,71 100,80 100,98 85,107 70,98"/>
    <polygon points="100,80 115,71 130,80 130,98 115,107 100,98"/>
    <polygon points="85,107 100,98 115,107 115,125 100,134 85,125"/>
    <polygon points="70,116 85,107 100,116 100,134 85,143 70,134"/>
  </g>
  <g class="pulse" opacity="0.5" fill="#00ff9c">
    <circle cx="85" cy="89" r="2"/>
    <circle cx="115" cy="89" r="2"/>
    <circle cx="100" cy="116" r="2"/>
  </g>

  <!-- Central title block -->
  <text x="450" y="115" fill="url(#title-grad)" font-size="52" font-weight="bold" text-anchor="middle" letter-spacing="14" filter="url(#acid-glow)" class="flicker">GEORGE</text>
  <text x="450" y="170" fill="url(#title-grad)" font-size="52" font-weight="bold" text-anchor="middle" letter-spacing="14" filter="url(#acid-glow)" class="flicker">MANDO</text>

  <!-- Underline accent -->
  <line x1="200" y1="182" x2="700" y2="182" stroke="#00ff9c" stroke-width="1" opacity="0.4" class="glow-line"/>
  <line x1="280" y1="186" x2="620" y2="186" stroke="#00ff9c" stroke-width="0.5" opacity="0.2"/>

  <!-- Subtitle -->
  <text x="450" y="210" fill="#00cc78" font-size="13" text-anchor="middle" letter-spacing="6" opacity="0.9">GAME DEVELOPER  ·  SYSTEMS ARCHITECT  ·  WORLD BUILDER</text>

  <!-- Studio tag -->
  <rect x="350" y="222" width="200" height="20" rx="2" fill="#001a06" stroke="#00ff9c" stroke-width="0.5" opacity="0.8"/>
  <text x="450" y="235" fill="#00ff9c" font-size="10" text-anchor="middle" letter-spacing="4" opacity="0.9">XENCLIPSE STUDIOS</text>

  <!-- Bottom status bar -->
  <line x1="8" y1="284" x2="892" y2="284" stroke="#00ff9c" stroke-width="0.5" opacity="0.4"/>
  <rect x="8" y="284" width="884" height="28" fill="#001a06" opacity="0.8"/>

  <!-- Bargraph left -->
  <g transform="translate(20,292)">
    <text x="0" y="10" fill="#00ff9c" font-size="8" opacity="0.6" letter-spacing="1">HIVE LOAD</text>
    <rect x="64" y="2" width="60" height="8" fill="none" stroke="#00ff9c" stroke-width="0.5" opacity="0.4"/>
    <rect x="64" y="2" width="43" height="8" fill="#00ff9c" opacity="0.5" class="pulse"/>
  </g>

  <!-- Status text centre -->
  <text x="450" y="302" fill="#00ff9c" font-size="9" text-anchor="middle" letter-spacing="3" opacity="0.7">[ UNIT STATUS: OPERATIONAL · OPEN TO CONTRACTS ]<tspan class="blink">_</tspan></text>

  <!-- Bargraph right -->
  <g transform="translate(740,292)">
    <text x="0" y="10" fill="#00ff9c" font-size="8" opacity="0.6" letter-spacing="1">SYS CORE</text>
    <rect x="54" y="2" width="60" height="8" fill="none" stroke="#00ff9c" stroke-width="0.5" opacity="0.4"/>
    <rect x="54" y="2" width="55" height="8" fill="#00ff9c" opacity="0.5" class="pulse2"/>
  </g>

  <!-- Hexagon cluster right -->
  <g opacity="0.25" fill="none" stroke="#00ff9c" stroke-width="0.8">
    <polygon points="770,80 785,71 800,80 800,98 785,107 770,98"/>
    <polygon points="800,80 815,71 830,80 830,98 815,107 800,98"/>
    <polygon points="785,107 800,98 815,107 815,125 800,134 785,125"/>
    <polygon points="770,116 785,107 800,116 800,134 785,143 770,134"/>
  </g>
  <g class="pulse2" opacity="0.5" fill="#00ff9c">
    <circle cx="785" cy="89" r="2"/>
    <circle cx="815" cy="89" r="2"/>
    <circle cx="800" cy="116" r="2"/>
  </g>
</svg>
