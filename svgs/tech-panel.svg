<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <style>
      .p1{animation:pulse 3s ease-in-out infinite}
      .p2{animation:pulse 3s ease-in-out infinite .7s}
      .p3{animation:pulse 3s ease-in-out infinite 1.4s}
      .p4{animation:pulse 3s ease-in-out infinite 2.1s}
      .p5{animation:pulse 3s ease-in-out infinite 2.8s}
      .p6{animation:pulse 3s ease-in-out infinite .4s}
      .p7{animation:pulse 3s ease-in-out infinite 1.1s}
      .scan{animation:scan 6s linear infinite}
      .glow{animation:glowline 2s ease-in-out infinite alternate}
      @keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}
      @keyframes scan{0%{transform:translateY(-3px);opacity:.4}100%{transform:translateY(198px);opacity:0}}
      @keyframes glowline{0%{opacity:.3}100%{opacity:.85}}
    </style>
    <filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000800"/><stop offset="100%" stop-color="#000300"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001f07"/><stop offset="100%" stop-color="#000a02"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#00ff9c" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/><line x1="800" y1="0" x2="800" y2="200"/>
  </g>
  <rect class="scan" x="0" y="0" width="900" height="1.5" fill="#00ff9c" opacity="0.1"/>

  <!-- Border -->
  <rect x="8" y="8" width="884" height="184" rx="3" fill="none" stroke="#00ff9c" stroke-width="1" opacity="0.35" class="glow"/>
  <polyline points="8,26 8,8 26,8" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#g)"/>
  <polyline points="874,8 892,8 892,26" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#g)"/>
  <polyline points="8,174 8,192 26,192" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#g)"/>
  <polyline points="874,192 892,192 892,174" fill="none" stroke="#00ff9c" stroke-width="2.5" filter="url(#g)"/>

  <!-- Header -->
  <rect x="8" y="8" width="884" height="22" fill="#001a06" opacity="0.9"/>
  <text x="20" y="22" fill="#00ff9c" font-size="10" letter-spacing="4" opacity="0.9">// TECH-MATRIX :: COMBAT LOADOUT</text>
  <text x="880" y="22" fill="#00ff9c" font-size="10" letter-spacing="2" text-anchor="end" opacity="0.6">MODULE_02</text>
  <line x1="8" y1="30" x2="892" y2="30" stroke="#00ff9c" stroke-width="0.5" opacity="0.3"/>

  <!-- Category labels -->
  <text x="20" y="50" fill="#00ff9c" font-size="8" letter-spacing="3" opacity="0.45">ENGINE CORES</text>
  <text x="20" y="110" fill="#00ff9c" font-size="8" letter-spacing="3" opacity="0.45">LANGUAGE ARSENAL</text>
  <text x="20" y="162" fill="#00ff9c" font-size="8" letter-spacing="3" opacity="0.45">TOOL CLUSTER</text>

  <!-- ENGINE CORES row -->
  <!-- Unreal -->
  <rect x="160" y="38" width="130" height="44" rx="3" fill="url(#cell)" stroke="#00ff9c" stroke-width="1" class="p1" filter="url(#g)"/>
  <text x="225" y="57" fill="#00ff9c" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">UNREAL</text>
  <text x="225" y="72" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="2" opacity="0.6">ENGINE 5</text>

  <!-- Unity -->
  <rect x="305" y="38" width="110" height="44" rx="3" fill="url(#cell)" stroke="#00ff9c" stroke-width="1" class="p2" filter="url(#g)"/>
  <text x="360" y="57" fill="#00ff9c" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">UNITY</text>
  <text x="360" y="72" fill="#00ff9c" font-size="8" text-anchor="middle" letter-spacing="2" opacity="0.6">ENGINE</text>

  <!-- Connector dots for engines -->
  <circle cx="150" cy="60" r="3" fill="#00ff9c" class="p1" filter="url(#g)"/>
  <line x1="153" y1="60" x2="160" y2="60" stroke="#00ff9c" stroke-width="0.8" opacity="0.5"/>

  <!-- LANGUAGE ARSENAL row -->
  <!-- C++ -->
  <rect x="160" y="96" width="90" height="44" rx="3" fill="url(#cell)" stroke="#00ff9c" stroke-width="1" class="p3" filter="url(#g)"/>
  <text x="205" y="115" fill="#00ff9c" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="2">C++</text>
  <text x="205" y="130" fill="#00ff9c" font-size="7" text-anchor="middle" letter-spacing="2" opacity="0.5">PRIMARY</text>

  <!-- C# -->
  <rect x="265" y="96" width="90" height="44" rx="3" fill="url(#cell)" stroke="#00ff9c" stroke-width="1" class="p4" filter="url(#g)"/>
  <text x="310" y="115" fill="#00ff9c" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="2">C#</text>
  <text x="310" y="130" fill="#00ff9c" font-size="7" text-anchor="middle" letter-spacing="2" opacity="0.5">SECONDARY</text>

  <!-- Python -->
  <rect x="370" y="96" width="100" height="44" rx="3" fill="url(#cell)" stroke="#00ff9c" stroke-width="1" class="p5" filter="url(#g)"/>
  <text x="420" y="115" fill="#00ff9c" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="2">PY</text>
  <text x="420" y="130" fill="#00ff9c" font-size="7" text-anchor="middle" letter-spacing="2" opacity="0.5">PYTHON</text>

  <!-- Connector dot for langs -->
  <circle cx="150" cy="118" r="3" fill="#00ff9c" class="p3" filter="url(#g)"/>
  <line x1="153" y1="118" x2="160" y2="118" stroke="#00ff9c" stroke-width="0.8" opacity="0.5"/>

  <!-- TOOL CLUSTER row -->
  <!-- Git -->
  <rect x="160" y="150" width="70" height="34" rx="3" fill="url(#cell)" stroke="#00ff9c" stroke-width="0.8" class="p6" filter="url(#g)"/>
  <text x="195" y="171" fill="#00ff9c" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">GIT</text>

  <!-- GitHub -->
  <rect x="242" y="150" width="80" height="34" rx="3" fill="url(#cell)" stroke="#00ff9c" stroke-width="0.8" class="p7" filter="url(#g)"/>
  <text x="282" y="171" fill="#00ff9c" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">GITHUB</text>

  <!-- VS -->
  <rect x="334" y="150" width="120" height="34" rx="3" fill="url(#cell)" stroke="#00ff9c" stroke-width="0.8" class="p1" filter="url(#g)"/>
  <text x="394" y="171" fill="#00ff9c" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">VISUAL STUDIO</text>

  <!-- VS Code -->
  <rect x="466" y="150" width="100" height="34" rx="3" fill="url(#cell)" stroke="#00ff9c" stroke-width="0.8" class="p2" filter="url(#g)"/>
  <text x="516" y="171" fill="#00ff9c" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">VS CODE</text>

  <!-- Connector dot for tools -->
  <circle cx="150" cy="167" r="3" fill="#00ff9c" class="p6" filter="url(#g)"/>
  <line x1="153" y1="167" x2="160" y2="167" stroke="#00ff9c" stroke-width="0.8" opacity="0.5"/>

  <!-- RIGHT: Hex cluster decoration -->
  <g opacity="0.18" fill="none" stroke="#00ff9c" stroke-width="0.8">
    <polygon points="730,50 750,39 770,50 770,72 750,83 730,72"/>
    <polygon points="770,50 790,39 810,50 810,72 790,83 770,72"/>
    <polygon points="810,50 830,39 850,50 850,72 830,83 810,72"/>
    <polygon points="750,83 770,72 790,83 790,105 770,116 750,105"/>
    <polygon points="790,83 810,72 830,83 830,105 810,116 790,105"/>
    <polygon points="730,116 750,105 770,116 770,138 750,149 730,138"/>
    <polygon points="770,116 790,105 810,116 810,138 790,149 770,138"/>
    <polygon points="810,116 830,105 850,116 850,138 830,149 810,138"/>
    <polygon points="750,149 770,138 790,149 790,171 770,182 750,171"/>
    <polygon points="790,149 810,138 830,149 830,171 810,182 790,171"/>
  </g>
  <!-- Hex glow nodes -->
  <g filter="url(#g)">
    <circle cx="750" cy="61" r="3" fill="#00ff9c" class="p1"/>
    <circle cx="790" cy="61" r="3" fill="#00ff9c" class="p3"/>
    <circle cx="830" cy="61" r="3" fill="#00ff9c" class="p5"/>
    <circle cx="770" cy="94" r="3" fill="#00ff9c" class="p2"/>
    <circle cx="810" cy="94" r="3" fill="#00ff9c" class="p4"/>
    <circle cx="750" cy="127" r="3" fill="#00ff9c" class="p6"/>
    <circle cx="790" cy="127" r="3" fill="#00ff9c" class="p1"/>
    <circle cx="830" cy="127" r="3" fill="#00ff9c" class="p3"/>
    <circle cx="770" cy="160" r="3" fill="#00ff9c" class="p5"/>
    <circle cx="810" cy="160" r="3" fill="#00ff9c" class="p7"/>
  </g>

  <!-- Organic stem right side -->
  <g opacity="0.12" stroke="#00cc78" stroke-width="1.2" fill="none">
    <path d="M 870 40 Q 885 80 870 120 Q 855 160 870 190"/>
    <path d="M 880 40 Q 892 80 880 120 Q 865 160 880 190"/>
  </g>

  <!-- Bottom -->
  <line x1="8" y1="186" x2="892" y2="186" stroke="#00ff9c" stroke-width="0.3" opacity="0.25"/>
  <text x="450" y="196" fill="#00ff9c" font-size="7" text-anchor="middle" letter-spacing="4" opacity="0.4">[ END LOADOUT MANIFEST ]</text>
</svg>
