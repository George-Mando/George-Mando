<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>George Carter — Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000600;overflow:hidden}
body{font-family:'Share Tech Mono',monospace;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,156,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,156,.04) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none}
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,156,.006) 2px,rgba(0,255,156,.006) 4px);
  pointer-events:none}
.panel{
  position:relative;z-index:1;text-align:center;
  background:rgba(0,13,5,.95);border:1px solid rgba(0,255,156,.3);
  border-radius:6px;padding:40px 48px;min-width:320px;max-width:480px;
}
.panel::before,.panel::after{content:'';position:absolute;width:14px;height:14px;border-color:rgba(0,255,156,.6);border-style:solid}
.panel::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.panel::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.sys-label{font-size:9px;letter-spacing:4px;color:rgba(0,255,156,.4);margin-bottom:24px}
.dice-wrap{margin:0 auto 24px;width:80px;height:80px}
.dice{
  width:80px;height:80px;border-radius:10px;border:2px solid rgba(0,255,156,.5);
  background:rgba(0,20,10,.8);display:flex;align-items:center;justify-content:center;font-size:46px;
}
.dice.rolling{animation:roll 1.4s cubic-bezier(.4,0,.2,1) forwards}
@keyframes roll{
  0%  {transform:rotateY(0)      rotateX(0)      scale(1);  box-shadow:none}
  20% {transform:rotateY(180deg) rotateX(90deg)  scale(1.2);box-shadow:0 0 30px rgba(0,255,156,.4)}
  50% {transform:rotateY(360deg) rotateX(180deg) scale(.85);box-shadow:0 0 10px rgba(0,255,156,.2)}
  80% {transform:rotateY(540deg) rotateX(270deg) scale(1.1);box-shadow:0 0 25px rgba(0,255,156,.3)}
  100%{transform:rotateY(720deg) rotateX(360deg) scale(1);  box-shadow:0 0 15px rgba(0,255,156,.15)}
}
.status{font-size:10px;letter-spacing:3px;color:rgba(0,255,156,.5);min-height:18px;margin-bottom:6px}
.bar-wrap{width:100%;height:3px;background:rgba(0,255,156,.08);border-radius:2px;overflow:hidden;margin-bottom:24px}
.bar-fill{height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,#00ff9c,#00e5ff);box-shadow:0 0 8px rgba(0,255,156,.5)}
.result{
  font-family:'Orbitron',monospace;font-size:13px;font-weight:700;
  letter-spacing:2px;padding:8px 20px;border-radius:3px;
  opacity:0;transform:translateY(6px);
  transition:opacity .4s,transform .4s;
  display:inline-block;margin-bottom:12px;text-decoration:none;cursor:pointer;
}
.result.show{opacity:1;transform:translateY(0)}
.result.xen{color:#00e5ff;border:1px solid rgba(0,229,255,.3);background:rgba(0,229,255,.07)}
.result.xen:hover{background:rgba(0,229,255,.15)}
.result.orig{color:#ff8c5a;border:1px solid rgba(255,107,53,.3);background:rgba(255,107,53,.07)}
.result.orig:hover{background:rgba(255,107,53,.15)}
.open-hint{font-size:9px;letter-spacing:2px;color:rgba(0,255,156,.3);margin-bottom:20px;
  opacity:0;transition:opacity .4s}
.open-hint.show{opacity:1}
.reroll{
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;
  background:none;border:1px solid rgba(0,255,156,.2);color:rgba(0,255,156,.4);
  padding:8px 20px;border-radius:3px;cursor:pointer;
  opacity:0;transition:opacity .4s,background .2s,color .2s,border-color .2s;display:block;margin:0 auto;
}
.reroll.show{opacity:1}
.reroll:hover{border-color:rgba(0,255,156,.7);color:#00ff9c;background:rgba(0,255,156,.05)}
</style>
</head>
<body>
<div class="panel">
  <div class="sys-label">// XENCLIPSE STUDIOS · RESUME SYSTEM</div>
  <div class="dice-wrap"><div class="dice" id="dice">🎲</div></div>
  <div class="status" id="status">INITIALIZING...</div>
  <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
  <a class="result" id="result" href="#" target="_self"></a>
  <div class="open-hint" id="hint">CLICK TO OPEN · AUTO-OPENING...</div>
  <button class="reroll" id="reroll-btn" onclick="startRoll()">🎲 &nbsp;RE-ROLL VARIANT</button>
</div>

<script>
// ── CONFIG ── update BASE if your Pages URL changes
const BASE = 'https://george-mando.github.io/George-Mando/';
const FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];
const VARIANTS = [
  { file: BASE + 'george-carter-resume-xenclipse.html', label: '▶  XENCLIPSE EDITION', cls: 'xen' },
  { file: BASE + 'george-carter-resume-original.html',  label: '▶  DARK EDITION',      cls: 'orig' }
];

let rolling = false;
let lastPick = -1;
let redirectTimer = null;

function startRoll(){
  if(rolling) return;
  rolling = true;
  if(redirectTimer) clearTimeout(redirectTimer);

  const dice   = document.getElementById('dice');
  const status = document.getElementById('status');
  const bar    = document.getElementById('bar');
  const result = document.getElementById('result');
  const hint   = document.getElementById('hint');
  const btn    = document.getElementById('reroll-btn');

  // reset UI
  result.className = 'result';
  result.textContent = '';
  result.href = '#';
  hint.className = 'open-hint';
  btn.className  = 'reroll';
  bar.style.transition = 'none';
  bar.style.width = '0%';
  status.textContent = 'ROLLING VARIANT...';

  // pick variant — never repeat same one twice in a row
  let pick;
  do { pick = Math.floor(Math.random() * VARIANTS.length) }
  while(pick === lastPick && VARIANTS.length > 1);
  lastPick = pick;
  const v = VARIANTS[pick];

  // spin dice faces
  dice.classList.add('rolling');
  let i = 0;
  const ticker = setInterval(()=>{
    dice.textContent = FACES[Math.floor(Math.random() * 6)];
    if(++i >= 14) clearInterval(ticker);
  }, 90);

  // animate progress bar
  requestAnimationFrame(()=> requestAnimationFrame(()=>{
    bar.style.transition = 'width 1.4s ease-out';
    bar.style.width = '100%';
  }));

  // reveal result as clickable link
  setTimeout(()=>{
    status.textContent = 'VARIANT SELECTED';
    result.href = v.file;
    result.className = 'result ' + v.cls + ' show';
    result.textContent = v.label;
  }, 950);

  // show hint + reroll button
  setTimeout(()=>{
    hint.className = 'open-hint show';
    btn.className  = 'reroll show';
  }, 1150);

  // auto-redirect
  redirectTimer = setTimeout(()=>{
    rolling = false;
    window.location.href = v.file;
  }, 2400);
}

startRoll();
</script>
</body>
</html>
