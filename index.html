<script>
/* =====================================================
   XENAI BRAIN — GROQ (FREE) POWERED
===================================================== */

const SYSTEM_PROMPT = `You are XENAI — the alien-human hybrid intelligence embedded in George Carter's XenClipse Studios control panel.

Tone: calm, precise, mysterious. Tactical. Loyal to George.
Responses: short, punchy, under 80 words unless detail requested.

FACTS:
- George Carter, founder of XenClipse Studios
- Engines: Unreal Engine 5, Unity
- Languages: C++, C#, Python
- Speciality: Gameplay systems, UE plugins, tools
- Main project: Blueprint Generator (75% complete)
- Status: OPEN TO HIRE
- Contact: xenclipsestudios@gmail.com
`;

let apiKey = '';
let conversationHistory = [];

/* =====================
   API KEY ACTIVATION
===================== */
function activateAI() {
  const input = document.getElementById('apiKeyInput');
  const status = document.getElementById('keyStatus');
  const key = input.value.trim();

  if (!key.startsWith('gsk_')) {
    status.textContent = '✗ INVALID KEY — must start with gsk_';
    status.className = 'key-status err';
    return;
  }

  apiKey = key;
  status.textContent = '✓ XENAI ONLINE — GROQ LINK ESTABLISHED';
  status.className = 'key-status ok';
  document.getElementById('faceStatus').textContent = 'ONLINE';

  addMessage(
    'ai',
    'XENAI online. Hive intelligence synchronized. Awaiting command.'
  );

  speak('XENAI online. Hive intelligence synchronized.');
}

/* =====================
   CHAT CORE
===================== */
function addMessage(role, text) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  div.innerHTML =
    role === 'ai'
      ? `<div class="speaker">XENAI //</div>${text}`
      : `<div class="speaker">OPERATOR //</div>${text}`;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function addThinking() {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ai thinking';
  div.id = 'thinkingMsg';
  div.innerHTML = '<div class="speaker">XENAI //</div>Processing...';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  if (!apiKey) {
    addMessage('ai', 'SYSTEM LOCKED. Insert Groq API key.');
    return;
  }

  addMessage('user', text);
  input.value = '';
  btn.disabled = true;

  conversationHistory.push({ role: 'user', content: text });
  const thinking = addThinking();

  try {
    const response = await fetch(
      'https://api.groq.com/openai/v1/chat/completions',
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'llama3-70b-8192',
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...conversationHistory
          ],
          temperature: 0.7,
          max_tokens: 300
        })
      }
    );

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'Groq failure');
    }

    const reply = data.choices[0].message.content;

    thinking.remove();
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);
    speak(reply);

  } catch (err) {
    thinking.remove();
    addMessage('ai', 'TRANSMISSION FAILED. CHECK API KEY / RATE LIMIT.');
  }

  btn.disabled = false;
}

/* =====================
   SPEECH (UNCHANGED)
===================== */
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const ut = new SpeechSynthesisUtterance(text);
  ut.pitch = 0.75;
  ut.rate = 0.9;
  speechSynthesis.speak(ut);
}
</script>
