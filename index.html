async function loadGitHubStats() {
  const user = 'George-Mando';
  const base = 'https://api.github.com';
  try {
    const [uRes, rRes, evRes] = await Promise.all([
      fetch(base+'/users/'+user),
      fetch(base+'/users/'+user+'/repos?per_page=100&sort=pushed'),
      fetch(base+'/users/'+user+'/events/public?per_page=30')
    ]);
    const u = await uRes.json();
    const repos = await rRes.json();
    const events = await evRes.json();

    // Stats grid
    const totalStars = repos.reduce((s,r)=>s+r.stargazers_count,0);
    const statsGrid = document.getElementById('gh-stats-grid');
    statsGrid.innerHTML = [
      ['PUBLIC REPOS', u.public_repos],
      ['TOTAL STARS', totalStars],
      ['FOLLOWERS', u.followers],
      ['FOLLOWING', u.following]
    ].map(([k,v])=>
      '<div class="brow" style="padding:10px;text-align:center;">' +
      '<div class="bk" style="margin-bottom:4px;">'+k+'</div>' +
      '<div class="bv hi" style="font-size:20px;letter-spacing:2px;">'+v+'</div></div>'
    ).join('');

    // Language breakdown
    const langMap = {};
    repos.forEach(r=>{ if(r.language) langMap[r.language]=(langMap[r.language]||0)+1; });
    const sorted = Object.entries(langMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const total = sorted.reduce((s,[,v])=>s+v,0);
    const colors = {'C++':'#f34b7d','C#':'#178600','Python':'#3572A5','JavaScript':'#f1e05a','TypeScript':'#2b7489','HLSL':'#aace60','ShaderLab':'#222c37'};
    const langsEl = document.getElementById('gh-langs');
    langsEl.innerHTML = '<div class="pl" style="margin-top:10px;">// LANG MATRIX</div>' +
      sorted.map(([lang,count])=>{
        const pct = Math.round(count/total*100);
        const col = colors[lang]||'#00ff9c';
        return '<div style="margin-bottom:7px;">' +
          '<div style="display:flex;justify-content:space-between;font-size:9px;letter-spacing:2px;color:var(--text-dim);margin-bottom:3px;">' +
          '<span style="color:var(--text);">'+lang+'</span><span>'+pct+'%</span></div>' +
          '<div class="btrk"><div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:1px;box-shadow:0 0 4px '+col+'44;"></div></div>' +
          '</div>';
      }).join('');

    // Streak-style data from events
    const pushDays = new Set();
    let totalCommits = 0;
    events.filter(e=>e.type==='PushEvent').forEach(e=>{
      pushDays.add(e.created_at.split('T')[0]);
      totalCommits += (e.payload.commits||[]).length;
    });
    const streakEl = document.getElementById('gh-streak');
    streakEl.innerHTML = [
      ['PUSH DAYS', pushDays.size+' (30d)'],
      ['RECENT COMMITS', totalCommits],
      ['ACTIVE REPOS', repos.filter(r=>{ const d=new Date(r.pushed_at); return (Date.now()-d)<30*864e5; }).length]
    ].map(([k,v])=>
      '<div class="brow" style="padding:10px;text-align:center;">' +
      '<div class="bk" style="margin-bottom:4px;">'+k+'</div>' +
      '<div class="bv hi" style="font-size:14px;letter-spacing:1px;">'+v+'</div></div>'
    ).join('');

    // Recent commits
    const pushEvents = events.filter(e=>e.type==='PushEvent').slice(0,8);
    const commitsEl = document.getElementById('gh-commits');
    commitsEl.innerHTML = pushEvents.map(e=>{
      const repo = e.repo.name.split('/')[1];
      const msg = (e.payload.commits||[{message:'pushed'}])[0].message.slice(0,42);
      const date = e.created_at.split('T')[0];
      return '<div style="padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:baseline;">' +
        '<span style="color:var(--acid);min-width:80px;">'+date+'</span>' +
        '<span style="color:var(--text-dim);min-width:90px;">'+repo+'</span>' +
        '<span style="color:var(--text);">'+msg+'</span></div>';
    }).join('') || '<span style="color:var(--text-dim);">NO RECENT PUSH EVENTS FOUND</span>';

    // Top repos
    const reposEl = document.getElementById('gh-repos');
    reposEl.innerHTML = repos.slice(0,5).map(r=>
      '<a href="'+r.html_url+'" target="_blank" class="link-btn ac" style="text-decoration:none;">' +
      '<span class="lb-icon">📁</span>' +
      '<span class="lb-text" style="display:flex;flex-direction:column;gap:2px;">' +
      '<span>'+r.name+'</span>' +
      '<span style="font-size:9px;color:var(--text-dim);letter-spacing:1px;">'+(r.language||'—')+' · ★'+r.stargazers_count+'</span>' +
      '</span><span class="lb-arr">→</span></a>'
    ).join('');

  } catch(err) {
    document.getElementById('gh-stats-grid').innerHTML =
      '<div style="grid-column:1/-1;font-size:10px;color:var(--red);letter-spacing:2px;padding:10px;">GITHUB API UNAVAILABLE — CHECK CONNECTION</div>';
  }
}
